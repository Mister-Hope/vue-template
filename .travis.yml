language: node_js
node_js:
  - lts/*
install:
  - npm ci
jobs:
  include:
    # 测试开发服务器
    - stage: test-dev
      name: "Test Dev Process"
      script: npm run serve

    # 部署 work 分支
    - stage: test-build
      name: "Test Build Process"
      script: npm run build

    # 部署 master 分支
    - stage: deploy
      name: "Deploy Demo"
      script: npm run build
      before_deploy: echo vue-demo.mrhope.site >> dist/CNAME
      deploy:
        provider: pages
        skip-cleanup: true
        local_dir: dist
        github-token: $Github_Token

stages:
  - name: Process
    if: branch = master
  - name: test-dev
    if: branch != master
  - name: test-build
    if: branch != master
